# blog.kiosk.pub Nginx 站点配置
# 路径：/etc/nginx/sites-available/blog.kiosk.pub
# 软链接：ln -s /etc/nginx/sites-available/blog.kiosk.pub /etc/nginx/sites-enabled/

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name blog.kiosk.pub;

    # Certbot 验证路径（证书申请时使用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name blog.kiosk.pub;

    # SSL 证书（certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/blog.kiosk.pub/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.kiosk.pub/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 前端静态文件
    root /opt/hxz-blog/frontend;
    index index.html;

    # API 反向代理到 Gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 前端 SPA 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 日志
    access_log /var/log/nginx/blog.kiosk.pub.access.log;
    error_log  /var/log/nginx/blog.kiosk.pub.error.log;
}
